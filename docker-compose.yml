version: '3.8'

services:
  server:
    build: ./server
    container_name: leetcode-server
    env_file:
      - ./server/.env
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - global-web-network

  client:
    build: ./client
    container_name: leetcode-client
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - global-web-network

networks:
  global-web-network:
    external: true # Tells docker this network was created manually outside