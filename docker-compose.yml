version: '3.8'

services:
  # The Reverse Proxy Service
  nginx:
    image: nginx:alpine
    container_name: leetcode-proxy
    ports:
      - "80:80"                  # Maps port 80 of your Mac to Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro  # Mounts your config file as Read-Only
    depends_on:
      - frontend
      - backend

  backend:
    build: ./server
    container_name: leetcode-backend
    env_file:
      - ./server/.env
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    # NO PORTS EXPOSED TO THE MAC

  frontend:
    build: ./client
    container_name: leetcode-frontend
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    # NO PORTS EXPOSED TO THE MAC