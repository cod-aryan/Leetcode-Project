events {
    worker_connections 1024;
}

http {
    # Include standard MIME types so CSS/JS load correctly
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # 1. Route any traffic starting with /api to the Express backend
        location /api/ {
            proxy_pass http://backend:3000; # 'backend' matches the Compose service name
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 2. Route all other traffic to the React Frontend (Vite dev server)
        location / {
            proxy_pass http://frontend:5173; # 'frontend' matches the Compose service name
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}